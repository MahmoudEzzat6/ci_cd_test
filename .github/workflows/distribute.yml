# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Firebase App Distribution Pipeline
# Triggers when you push a version tag (e.g., v1.0.0)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: 🚀 Distribute to Firebase

on:
  push:
    tags:
      - "v*" # Triggers on tags like v1.0.0, v2.1.3, etc.

  # Allows you to run this workflow manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for this build"
        required: false
        default: "New build from CI/CD 🚀"

jobs:
  distribute:
    name: 📦 Build & Distribute to Firebase
    runs-on: ubuntu-latest

    steps:
      # ── Get the code ──
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Set up Java ──
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # ── Set up Flutter ──
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: "stable"
          cache: true

      # ── Install dependencies ──
      - name: 📦 Install dependencies
        run: flutter pub get

      # ── Run tests before building ──
      - name: 🧪 Run tests
        run: flutter test

      # ── Decode keystore from secret ──
      # You need to base64 encode your keystore and save it as a GitHub secret
      # Command: base64 -i your-key.jks > keystore_base64.txt
      - name: 🔐 Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # ── Create key.properties for signing ──
      - name: 🔑 Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # ── Build release APK ──
      - name: 🔨 Build release APK
        run: flutter build apk --release

      # ── Upload to Firebase App Distribution ──
      - name: 🔥 Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE_CONTENT }}
          groups: qa-team
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            ${{ github.event.inputs.release_notes || format('Version: {0} | Commit: {1}', github.ref_name, github.sha) }}

      # ── Upload release APK as GitHub artifact too ──
      - name: 📤 Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
