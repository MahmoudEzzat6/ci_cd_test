# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Flutter CI Pipeline
# Runs on every push and pull request to main/develop
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Flutter CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build_and_test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── Get the code ──
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── Set up Java (required for Android builds) ──
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # ── Set up Flutter ──
      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: "stable"
          cache: true

      # ── Install dependencies ──
      - name: 📦 Install dependencies
        run: flutter pub get

      # ── Code quality check ──
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos

      # ── Run tests ──
      - name: 🧪 Run tests
        run: flutter test

      # ── Build debug APK ──
      - name: 🔨 Build debug APK
        run: flutter build apk --debug

      # ── Upload APK so you can download it from GitHub ──
      - name: 📤 Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
